<!DOCTYPE html>
<html>
<head>
    <title>Semantic Table and Media List</title>
</head>
<body>

<table border="1">
    <thead>
        <tr>
            <th>Roll numbers</th>
            <th>Names</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>101</td>
            <td>John</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Emma</td>
        </tr>
        <tr>
            <td>103</td>
            <td>David</td>
        </tr>
    </tbody>
</table>

<h2>List of medias</h2>

<ol>
    <li>
        <img src="https://picsum.photos/id/123/200/300" alt="Random image">
    </li>
    <li>
        <video controls width="320">
            <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
        </video>
    </li>
    <li>
        <audio controls src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg"></audio>
    </li>
</ol>

</body>
</html>
